<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메큘레이터 (MECULATOR) | 장비 딸깍 진단서</title>
    <meta name="description" content="Nexon Open API 기반 실시간 메이플스토리 장비 진단 서비스. 내 캐릭터의 취약한 아이템을 확인하고 스펙업 솔루션을 받아보세요.">

    <meta name="keywords" content="메큘레이터, MECULATOR, 딸깍, 장비딸깍, 메이플스토리, 장비분석, 메이플스토리 진단">
    <meta name="google-site-verification" content="2fm4LwvSh6Pv-cCyGQlOxVyzFHDmcKSLzIzonyh5F6E" />
    <meta property="og:title" content="메큘레이터 - 내 캐릭터 장비 분석">
    <meta property="og:description" content="실시간 데이터를 바탕으로 최적의 장비 교체 순서를 제안합니다.">
    <meta property="og:url" content="https://meculator.onrender.com">
    <link rel="icon" href="/static/images/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/images/favicon.ico" type="image/x-icon">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/static/js/app.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Anton&family=Orbitron:wght@900&family=Cinzel:wght@900&display=swap');
        [x-cloak] { display: none !important; }
        .medical-grid { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.025em; }

        .font-rank-cyber {
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 0.05em;
        font-style: italic; /* 약간 기울이면 더 세련되어 보입니다 */
        }

        .font-rank-impact {
        font-family: 'Anton', sans-serif;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        }

        .font-rank-classic {
        font-family: 'Cinzel', serif;
        letter-spacing: 0.15em;
        }

        @keyframes rainbow-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .bg-ultimate {
            background: linear-gradient(270deg, #34d399, #3b82f6, #a855f7, #ec4899);
            background-size: 400% 400%;
            animation: rainbow-flow 3s ease infinite;
        }

        .transition-layout { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 medical-grid min-h-screen font-sans text-slate-900 pb-20">
    <div x-data="meculatorApp"
         class="max-w-3xl mx-auto py-12 px-4 transition-all duration-500"
         :class="report ? 'max-w-5xl' : 'max-w-3xl'">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
