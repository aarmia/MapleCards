<div class="bg-white rounded-2xl border border-slate-200 p-5 flex flex-col md:flex-row gap-6 shadow-sm animate-fade-in hover:border-emerald-200 transition-colors"
     :class="viewMode === 'special' ? 'border-l-4 border-l-emerald-400' : ''">

    <div class="flex flex-col items-center justify-center min-w-[80px]">
        <span class="text-[9px] font-black mb-2 tracking-widest uppercase text-slate-400">Special Part</span>
        <div @click="openItemDetail(item)"
             class="relative p-3 rounded-2xl cursor-pointer hover:scale-110 transition-transform active:scale-95 border-2 border-emerald-50 bg-emerald-50/30">
            <img :src="item.icon" class="w-12 h-12 object-contain drop-shadow-sm">
            <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 text-[8px] font-bold px-2 py-0.5 rounded-full bg-emerald-500 text-white whitespace-nowrap">특수부위</span>
        </div>
    </div>

    <div class="flex-1">
        <div class="flex items-center gap-2 mb-2">
            <h3 class="font-black text-slate-800 tracking-tight text-lg" x-text="item.name"></h3>
            <span class="text-[9px] px-2 py-1 rounded font-black bg-emerald-100 text-emerald-700 uppercase" x-text="item.part"></span>
        </div>

        <div class="rounded-xl p-3 border border-emerald-100 bg-emerald-50/50 mb-4 shadow-sm">
            <p class="text-[13px] leading-snug font-bold text-emerald-800">
                <span class="mr-1">✨</span>
                <span x-text="item.guide"></span>
            </p>
        </div>

        <div class="flex items-center gap-6">
            <div class="flex flex-col">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">추가옵션/고유 수치</span>
                <span class="text-lg font-black text-slate-700" x-text="item.detail.add + ' 점'"></span>
            </div>
            <div class="h-8 w-[1px] bg-slate-100"></div>
            <div class="flex flex-col">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">진단 결과</span>
                <span class="text-sm font-bold text-emerald-600">정상 진료 완료</span>
            </div>
        </div>
    </div>

    <div class="w-full md:w-28 border-t md:border-t-0 md:border-l border-slate-100 flex flex-col justify-center items-center bg-slate-50/50 py-4">
        <span class="text-[9px] font-bold text-slate-400 tracking-widest mb-1 uppercase">Total Score</span>
        <span class="text-3xl font-black text-slate-800 tracking-tighter" x-text="item.total_score"></span>
    </div>
</div>
