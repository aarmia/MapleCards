{% extends "base.html" %}

{% block content %}
    {% include "components/_header.html" %}

    <div x-cloak x-show="report && !report.error" id="report-area" class="p-2 animate-fade-in">
        <div class="flex justify-end gap-2 mb-4">
            <button @click="viewMode = (viewMode === 'wse' ? 'top5' : 'wse')"
                    class="flex items-center gap-2 text-xs font-bold px-4 py-2 rounded-lg transition-all shadow-sm border"
                    :class="viewMode === 'wse' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-blue-600 border-blue-200 hover:bg-blue-50'">
                <span x-text="viewMode === 'wse' ? '🔙 취약 아이템 보기' : '⚔️ 특수부위 정보 보기'"></span>
            </button>
            <button @click="viewMode = (viewMode === 'all' ? 'top5' : 'all')"
                    class="flex items-center gap-2 text-xs font-bold px-4 py-2 rounded-lg transition-all shadow-sm border"
                    :class="viewMode === 'all' ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50'">
                <span x-text="viewMode === 'all' ? '⚠️ 취약 아이템 5종만 보기' : '📊 모든 아이템 점수 보기'"></span>
            </button>
        </div>

        {% include "components/_summary.html" %}

        <div class="space-y-4">
            <template x-if="viewMode !== 'wse'">
                <div class="space-y-4">
                    {% include "components/_item_list.html" %}
                </div>
            </template>

            <template x-if="viewMode === 'wse'">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 animate-fade-in">
                    {% include "components/_wse_grid.html" %}
                </div>
            </template>
        </div>
    </div>

    {% include "components/_modals.html" %}
{% endblock %}
